<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Snake IA</title>
<style>
body { font-family: Arial; text-align:center; background:#111; color:#fff; }
#game { background:#000; margin-top:10px; }
video { margin-top:10px; border:2px solid #fff; }
.hidden { display:none; }
button { padding:10px; margin:5px; }
</style>
</head>
<body>

<h1>🐍 Snake IA</h1>

<!-- LOGIN -->
<div id="auth">
<h3>Registro / Login</h3>
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">
<br>
<button onclick="register()">Registrar</button>
<button onclick="login()">Login</button>
</div>

<!-- GAME -->
<div id="gameUI" class="hidden">
<h3 id="welcome"></h3>
<canvas id="game" width="400" height="400"></canvas>
<h3>Puntaje: <span id="score">0</span></h3>
<button onclick="startGame()">Iniciar Juego</button>

<h3>Ranking</h3>
<ul id="ranking"></ul>

<h3>Historial</h3>
<ul id="history"></ul>

<video id="webcam" width="200" height="200" autoplay></video>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/speech"></script>

<script>
// ===== AUTH =====
let currentUser = null;

function register(){
 let u = user.value;
 let p = pass.value;
 localStorage.setItem(u, JSON.stringify({pass:p, scores:[]}));
 alert("Registrado");
}

function login(){
 let data = JSON.parse(localStorage.getItem(user.value));
 if(data && data.pass === pass.value){
   currentUser = user.value;
   auth.classList.add("hidden");
   gameUI.classList.remove("hidden");
   welcome.innerText = "Bienvenido " + currentUser;
   loadRanking();
   loadHistory();
 } else alert("Error login");
}

// ===== GAME =====
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let snake, dx, dy, food, score, gameInterval;

function startGame(){
 snake = [{x:200,y:200}];
 dx = 20; dy = 0;
 food = {x:100,y:100};
 score = 0;
 scoreEl.innerText = score;
 clearInterval(gameInterval);
 gameInterval = setInterval(draw,100);
}

function draw(){
 ctx.clearRect(0,0,400,400);

 // snake
 snake.forEach(s=>ctx.fillRect(s.x,s.y,20,20));

 // food
 ctx.fillStyle = "red";
 ctx.fillRect(food.x, food.y,20,20);
 ctx.fillStyle = "white";

 let head = {x: snake[0].x + dx, y: snake[0].y + dy};

 // collision wall
 if(head.x<0||head.y<0||head.x>=400||head.y>=400||collision(head)){
   endGame(); return;
 }

 snake.unshift(head);

 // eat
 if(head.x===food.x && head.y===food.y){
   score++;
   scoreEl.innerText = score;
   food = {x:Math.floor(Math.random()*20)*20, y:Math.floor(Math.random()*20)*20};
 } else snake.pop();
}

function collision(head){
 return snake.some(s=>s.x===head.x && s.y===head.y);
}

function endGame(){
 clearInterval(gameInterval);
 saveScore();
 alert("Game Over");
}

// ===== SAVE =====
function saveScore(){
 let data = JSON.parse(localStorage.getItem(currentUser));
 data.scores.push(score);
 localStorage.setItem(currentUser, JSON.stringify(data));
 loadRanking();
 loadHistory();
}

function loadRanking(){
 ranking.innerHTML="";
 let users = Object.keys(localStorage);
 let allScores=[];
 users.forEach(u=>{
   let d=JSON.parse(localStorage.getItem(u));
   d.scores.forEach(s=>allScores.push({u,s}));
 });
 allScores.sort((a,b)=>b.s-a.s);
 allScores.slice(0,5).forEach(r=>{
   let li=document.createElement("li");
   li.innerText=r.u+": "+r.s;
   ranking.appendChild(li);
 });
}

function loadHistory(){
 history.innerHTML="";
 let data = JSON.parse(localStorage.getItem(currentUser));
 data.scores.forEach(s=>{
   let li=document.createElement("li");
   li.innerText="Puntaje: "+s;
   history.appendChild(li);
 });
}

// ===== IA IMAGEN =====
const URL_IMG = "https://teachablemachine.withgoogle.com/models/cveAi7UGP/";
let model, webcam;

async function initCam(){
 model = await tmImage.load(URL_IMG+"model.json", URL_IMG+"metadata.json");
 webcam = new tmImage.Webcam(200,200,true);
 await webcam.setup();
 await webcam.play();
 document.getElementById("webcam").srcObject = webcam.webcam.stream;
 loop();
}

async function loop(){
 webcam.update();
 const p = await model.predict(webcam.canvas);
 let max = p.reduce((a,b)=>a.probability>b.probability?a:b);
 move(max.className, "imagen");
 requestAnimationFrame(loop);
}

// ===== IA VOZ =====
const URL_AUDIO = "https://teachablemachine.withgoogle.com/models/zpw77hX0p/";

async function initAudio(){
 const r = speechCommands.create("BROWSER_FFT",undefined,URL_AUDIO+"model.json",URL_AUDIO+"metadata.json");
 await r.ensureModelLoaded();
 r.listen(res=>{
   let scores = res.scores;
   let labels = r.wordLabels();
   let i = scores.indexOf(Math.max(...scores));
   move(labels[i], "voz");
 }, {probabilityThreshold:0.75});
}

// ===== MOVIMIENTO CON REGLAS =====
function move(dir, source){
 // prioridad voz
 if(source==="imagen" && lastSource==="voz") return;
 lastSource = source;

 if(dir==="Arriba" && dy!==20){ dx=0; dy=-20; }
 if(dir==="Abajo" && dy!==-20){ dx=0; dy=20; }
 if(dir==="Izquierda" && dx!==20){ dx=-20; dy=0; }
 if(dir==="Derecha" && dx!==-20){ dx=20; dy=0; }
}

let lastSource="";

// iniciar IA
initCam();
initAudio();
</script>

</body>
</html>
